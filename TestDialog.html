<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    textarea { width: 100%; height: 100px; padding: 8px; }
    button { width: 100%; padding: 10px; margin-top: 10px; font-size: 16px; }
    #status { margin-top: 10px; white-space: pre-wrap; font-weight: bold; }
  </style>
</head>
<body>
  <h2>⚾ Quick Intake (Test)</h2>
  <label>Card Numbers</label>
  <textarea id="cards" placeholder="Enter card numbers..."></textarea>
  <button onclick="processIntake()">Submit</button>
  <div id="status"></div>

  <script>
    function processIntake() {
      var raw = document.getElementById("cards").value;
      alert("Raw: " + raw);
      document.getElementById("status").innerText = "Sent: " + raw;
    }
  </script>
</body>
</html>
